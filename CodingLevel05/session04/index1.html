<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: mediumseagreen;
        }
        .header{
            border: 10px dashed rgba(27, 202, 144, 0.678);
            border-radius: 50px;
            padding: 20px;
            margin: 20px;
            background-color:aquamarine;
            text-align: center;
        }
        .content{
            border: 10px double rgba(27, 202, 144, 0.678);
            border-radius: 35px;
            padding: 20px;
            margin: 20px;
            background-color: aquamarine
        }
        .footer{
            border: 7px;
            border-radius: 35px;
            padding: 20px;
            margin: 20px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>My Profile Website</h1>
    </div>

    <div class="content">
        <h2>About Me</h2>
        <p>I love teaching computer programming.</p>
    </div>

    <div class="footer">
        <p>© 2026 My Website</p>
    </div>
</body>
</html>
