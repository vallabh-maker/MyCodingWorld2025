<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>
    <div class = 'container mt-5' style = 'max-width: 500px;'>
        <h2 class = 'mb-4'>Contact Form</h2>
        <form>
            <div class = 'row'>
                <div class = 'col-6 mb-3'>
                    <div class ='mb-3'>
                <label for = 'firstname' class = 'form-label'>First Name</label>
                <input type = 'text' id = 'firstname' class = 'form-control' placeholder="Enter your first name">
                    </div>
                    <div class ='mb-3'>
                <label for = 'lastname' class = 'form-label'>Last Name</label>
                <input type = 'text' id = 'lastname' class = 'form-control' placeholder="Enter your last name">
                    </div>
                </div>
            </div>
        
            
            <div class ='mb-3'>
                <label for = 'email' class = 'form-label'>Email</label>
                <input type = 'email' id = 'email' class = 'form-control' placeholder="Enter your email id">
            </div>
            <div class ='mb-3'>
                <label for = 'phone' class = 'form-label'>Phone Number</label>
                <input type = 'tel' id = 'phone' class = 'form-control' placeholder="Enter your phone number">
            </div>
            <div class = 'mb-3'>
                <label>Choose Course</label>
                <select name = 'course' class = 'form-select'>
                    <option selected>Select Course</option>
                    <option value = '1'>Hobby Classes</option>
                    <option value = '2'>Academic Classes</option>
                    <option value = '3'>Bridge Classes</option>
                    <option value = '4'>Engineering Classes</option>
                </select>
            </div>
            <div class ='mb-3'>
                <label for = 'message' class = 'form-label'>Message</label>
                <textarea type = 'message' id = 'message' class = 'form-control' placeholder="Write your message here" rows = 4></textarea>
            </div>
            <button class = 'btn btn-primary w-100'>Send</button>
        </form>
    </div>
</body>
</html>
