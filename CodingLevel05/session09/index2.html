<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img src = 'bulb_off.gif' alt = "Bulb Off" id = 'bulb'>

    <button onclick = 'turnOn()'>Turn On</button>
    <button onclick = 'turnOff()'>Turn Off</button>

    <button onclick = 'Toggle()'>Toggle Bulb</button>

    <script>
        function turnOn() {
            document.getElementById('bulb').src = 'bulb_on.gif';
        }
        function turnOff() {
            document.getElementById('bulb').src = 'bulb_off.gif';
        }
        function Toggle() {
            let bulb = document.getElementById('bulb');

            if (bulb.src.includes('bulb_off.gif')) {
                bulb.src = 'bulb_on.gif'
            }
            else {
                bulb.src = 'bulb_off.gif'
            }
        }
    </script>

</body>
</html>
