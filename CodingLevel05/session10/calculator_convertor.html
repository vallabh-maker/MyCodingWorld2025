<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Unit Convertor</h2>

    <table border = 1>
        <tr>
            <th>Sl No.</th>
            <th>Functionality</th>
            <th>Input</th>
            <th>Operation</th>
            <th>Output</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Fahrenheit to Celsius</td>
            <td>
                <label>Temperature in Fahrenheit:</label>
                <input type = 'number' id = 'Fahrenheit_1' placeholder="Enter temperature in fahrenheit">
            </td>
            <td>
                <button onclick = 'fahrenheitToCelsius()'>Temperature in Celsius</button>
            </td>
            <td>
                <p id = 'result_fahrenheit_celsius'></p>
            </td>
        </tr>
        <tr>
            <td>2</td>
            <td>Celsius to Fahrenheit</td>
            <td>
                <label>Temperature in Celsius:</label>
                <input type = 'number' id = 'Celsius_1' placeholder="Enter temperature in celsius">
            </td>
            <td>
                <button onclick = 'celsiusToFahrenheit()'>Temperature in Fahrenheit</button>
            </td>
            <td>
                <p id = 'result_celsius_fahrenheit'></p>
            </td>
        </tr>
        <tr>
            <td>3</td>
            <td>Fahrenheit to Kelvin</td>
            <td>
                <label>Temperature in Fahrenheit:</label>
                <input type = 'number' id = 'Fahrenheit_2' placeholder="Enter temperature in fahrenheit">
            </td>
            <td>
                <button onclick = 'fahrenheitToKelvin()'>Temperature in Kelvin</button>
            </td>
            <td>
                <p id = 'result_fahrenheit_kelvin'></p>
            </td>
        </tr>
        <tr>
            <td>4</td>
            <td>Kelvin to Fahrenheit</td>
            <td>
                <label>Temperature in Kelvin:</label>
                <input type = 'number' id = 'Kelvin_1' placeholder="Enter temperature in kelvin">
            </td>
            <td>
                <button onclick = 'kelvinToFahrenheit()'>Temperature in Fahrenheit</button>
            </td>
            <td>
                <p id = 'result_kelvin_fahrenheit'></p>
            </td>
        </tr>
        <tr>
            <td>5</td>
            <td>Celsius to Kelvin</td>
            <td>
                <label>Temperature in Celsius:</label>
                <input type = 'number' id = 'Celsius_2' placeholder="Enter temperature in celsius">
            </td>
            <td>
                <button onclick = 'celsiusToKelvin()'>Temperature in Kelvin</button>
            </td>
            <td>
                <p id = 'result_celsius_kelvin'></p>
            </td>
        </tr>

</body>
</html>
